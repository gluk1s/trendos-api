services:
  database:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: project
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"

  php:
    build: 
      context: .
      dockerfile: docker/Dockerfile
    volumes:
      - .:/var/www/html
    working_dir: /var/www/html
    environment:
      DATABASE_URL: "mysql://root:root@database:3306/project?serverVersion=8.0"

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php